version: '3.8'


services:
    app:
      build:
        context: .
        dockerfile: Dockerfile
      image: 339712713340.dkr.ecr.us-east-1.amazonaws.com/devops-projeto-fase1:latest
      container_name: devops-app
      ports:
        - "3000:3000"
      environment:
        - NODE_ENV=production
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 10s